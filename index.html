<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крипто скринер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background: #0e1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { display: flex; width: 100%; height: 100vh; }
        .chart-container { flex: 4; height: 100vh; position: relative; }
        .screener-container { flex: 1; height: 100vh; border-left: 1px solid #2a2e39; background: #131722; color: #d1d4dc; display: flex; flex-direction: column; overflow-y: auto; }
        .screener-header { padding: 12px 10px; border-bottom: 1px solid #2a2e39; font-weight: 600; position: sticky; top: 0; background: #131722; z-index: 10; }
        .coin-list { list-style: none; }
        .coin-item { display: flex; justify-content: space-between; padding: 10px 10px; border-bottom: 1px solid #2a2e39; cursor: pointer; transition: background 0.2s; }
        .coin-item:hover { background: #1e222d; }
        .coin-item.active { background: #2962ff; color: white; }
        .coin-symbol { font-weight: 600; }
        .coin-change { font-weight: 500; }
        .positive { color: #26a69a; }
        .negative { color: #ef5350; }
        .active .positive, .active .negative { color: inherit; }
        #chart { width: 100%; height: 100%; }
    </style>
    <!-- Подключаем Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="container">
        <div class="chart-container">
            <div id="chart"></div>
        </div>
        
        <div class="screener-container">
            <div class="screener-header">📋 Топ 50 монет (24ч)</div>
            <ul class="coin-list" id="coin-list"></ul>
        </div>
    </div>

    <script>
        (function() {
            // --- 1. Инициализация графика ---
            const chartContainer = document.getElementById('chart');
            const chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
                layout: {
                    backgroundColor: '#0e1117',
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#2a2e39' },
                    horzLines: { color: '#2a2e39' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: false },
            });

            const candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });

            window.addEventListener('resize', () => {
                chart.applyOptions({
                    width: chartContainer.clientWidth,
                    height: chartContainer.clientHeight,
                });
            });

            // --- 2. Настройка API (теперь Binance) ---
            const API_BASE = 'https://api.binance.com/api/v3';
            let currentAssetSymbol = 'BTCUSDT';
            let currentInterval = '1h';

            // --- 3. Загрузка данных графика ---
            async function loadChartData(symbol, interval) {
                const url = `${API_BASE}/klines?symbol=${symbol}&interval=${interval}&limit=500`;
                try {
                    const response = await fetch(url);
                    const json = await response.json();
                    
                    const data = json.map(item => ({
                        time: Math.floor(item[0] / 1000), // Время в секундах
                        open: parseFloat(item[1]),
                        high: parseFloat(item[2]),
                        low: parseFloat(item[3]),
                        close: parseFloat(item[4]),
                    }));
                    
                    candlestickSeries.setData(data);
                } catch (error) {
                    console.error('Ошибка загрузки данных графика:', error);
                }
            }

            // --- 4. Загрузка и отрисовка списка монет ---
            async function loadCoinList() {
                try {
                    // Получаем информацию о всех торговых парах
                    const exchangeInfoResponse = await fetch(`${API_BASE}/exchangeInfo`);
                    const exchangeInfo = await exchangeInfoResponse.json();
                    
                    // Фильтруем только USDT пары
                    const usdtPairs = exchangeInfo.symbols.filter(s => s.symbol.endsWith('USDT'));
                    
                    // Получаем 24-часовую статистику для первых 50 пар
                    const tickersResponse = await fetch(`${API_BASE}/ticker/24hr`);
                    const tickers = await tickersResponse.json();
                    
                    // Объединяем информацию о символах с их статистикой
                    const coinData = usdtPairs
                        .map(pair => {
                            const ticker = tickers.find(t => t.symbol === pair.symbol);
                            if (!ticker) return null;
                            return {
                                symbol: pair.symbol.replace('USDT', ''),
                                fullSymbol: pair.symbol,
                                changePercent: parseFloat(ticker.priceChangePercent),
                            };
                        })
                        .filter(coin => coin !== null)
                        .sort((a, b) => b.changePercent - a.changePercent) // Сортируем по росту
                        .slice(0, 50); // Берём топ-50
                    
                    const listEl = document.getElementById('coin-list');
                    listEl.innerHTML = '';
                    
                    coinData.forEach(coin => {
                        const change = coin.changePercent;
                        const changeStr = change.toFixed(2) + '%';
                        const changeClass = change >= 0 ? 'positive' : 'negative';
                        
                        const li = document.createElement('li');
                        li.className = 'coin-item' + (coin.fullSymbol === currentAssetSymbol ? ' active' : '');
                        li.innerHTML = `
                            <span class="coin-symbol">${coin.symbol}</span>
                            <span class="coin-change ${changeClass}">${changeStr}</span>
                        `;
                        
                        li.addEventListener('click', () => {
                            currentAssetSymbol = coin.fullSymbol;
                            loadChartData(currentAssetSymbol, currentInterval);
                            // Обновляем активный класс
                            document.querySelectorAll('.coin-item').forEach(el => el.classList.remove('active'));
                            li.classList.add('active');
                        });
                        
                        listEl.appendChild(li);
                    });
                } catch (error) {
                    console.error('Ошибка загрузки списка:', error);
                }
            }

            // --- 5. Запуск ---
            loadChartData(currentAssetSymbol, currentInterval);
            loadCoinList();
        })();
    </script>
</body>
</html>
