<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крипто скринер (реалтайм)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background: #1e1e1e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { display: flex; width: 100%; height: 100vh; }
        
        .chart-wrapper { flex: 4; height: 100vh; display: flex; flex-direction: column; background: #1e1e1e; }
        
        .timeframe-panel {
            display: flex;
            gap: 4px;
            padding: 6px 8px;
            background: #1e1e1e;
            border-bottom: 1px solid #3a3f4b;
        }
        .tf-btn {
            background: #2a2e39;
            border: none;
            color: #b0b5c0;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3f4b;
        }
        .tf-btn:hover { background: #3a3f4b; color: white; }
        .tf-btn.active { background: #2962ff; color: white; border-color: #2962ff; }
        
        .chart-container { flex: 1; width: 100%; position: relative; }
        #chart { width: 100%; height: 100%; }

        .screener-container {
            flex: 1;
            height: 100vh;
            border-left: 1px solid #3a3f4b;
            background: #1e1e1e;
            color: #d1d4dc;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .screener-header {
            padding: 12px 10px;
            border-bottom: 1px solid #3a3f4b;
            font-weight: 600;
            position: sticky;
            top: 0;
            background: #1e1e1e;
            z-index: 10;
        }
        .coin-list { list-style: none; }
        .coin-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 10px;
            border-bottom: 1px solid #3a3f4b;
            cursor: pointer;
            transition: background 0.2s;
        }
        .coin-item:hover { background: #2a2e39; }
        .coin-item.active { background: #2962ff; color: white; }
        .coin-symbol { font-weight: 600; }
        .coin-change { font-weight: 500; }
        .positive { color: #26a69a; }
        .negative { color: #ef5350; }
        .active .positive, .active .negative { color: inherit; }
    </style>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="container">
        <div class="chart-wrapper">
            <div class="timeframe-panel">
                <button class="tf-btn active" data-interval="1m">1m</button>
                <button class="tf-btn" data-interval="5m">5m</button>
                <button class="tf-btn" data-interval="30m">30m</button>
                <button class="tf-btn" data-interval="4h">4h</button>
            </div>
            <div class="chart-container">
                <div id="chart"></div>
            </div>
        </div>
        
        <div class="screener-container">
            <div class="screener-header">📋 Топ 50 монет (24ч)</div>
            <ul class="coin-list" id="coin-list"></ul>
        </div>
    </div>

    <script>
        (function() {
            // --- 1. График (тёмная тема, без маркеров) ---
            const chartContainer = document.getElementById('chart');
            const chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
                layout: { backgroundColor: '#1e1e1e', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#3a3f4b' }, horzLines: { color: '#3a3f4b' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: false },
                theme: 'dark',
            });

            const candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350',
                borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });

            const ema65Series = chart.addLineSeries({
                color: '#ff9800', lineWidth: 1, lastValueVisible: false,
                priceLineVisible: false, pointMarkersVisible: false, crosshairMarkerVisible: false,
            });
            const ema125Series = chart.addLineSeries({
                color: '#2196f3', lineWidth: 1, lastValueVisible: false,
                priceLineVisible: false, pointMarkersVisible: false, crosshairMarkerVisible: false,
            });
            const ema450Series = chart.addLineSeries({
                color: '#9c27b0', lineWidth: 1, lastValueVisible: false,
                priceLineVisible: false, pointMarkersVisible: false, crosshairMarkerVisible: false,
            });

            window.addEventListener('resize', () => chart.applyOptions({
                width: chartContainer.clientWidth, height: chartContainer.clientHeight
            }));

            // --- 2. Состояние ---
            const API_BASE = 'https://api.binance.com/api/v3';
            let currentAssetSymbol = 'BTCUSDT';
            let currentInterval = '1m';
            
            // WebSocket
            let ws = null;
            let wsReconnectTimer = null;
            let activeSubscriptions = new Set();

            // Данные для индикаторов (храним последние 500 свечей)
            let candleData = [];

            // --- 3. Расчёт EMA ---
            function calculateEMA(data, period) {
                if (data.length === 0) return [];
                const k = 2 / (period + 1);
                const emaArray = [];
                let prevEma = data[0].close;
                emaArray.push({ time: data[0].time, value: prevEma });
                for (let i = 1; i < data.length; i++) {
                    const ema = data[i].close * k + prevEma * (1 - k);
                    emaArray.push({ time: data[i].time, value: ema });
                    prevEma = ema;
                }
                return emaArray;
            }

            function updateIndicators() {
                if (candleData.length === 0) return;
                const ema65 = calculateEMA(candleData, 65);
                const ema125 = calculateEMA(candleData, 125);
                const ema450 = calculateEMA(candleData, 450);
                ema65Series.setData(ema65);
                ema125Series.setData(ema125);
                ema450Series.setData(ema450);
            }

            // --- 4. Загрузка истории через REST ---
            async function fetchHistory(symbol, interval) {
                const url = `${API_BASE}/klines?symbol=${symbol}&interval=${interval}&limit=500`;
                const resp = await fetch(url);
                const json = await resp.json();
                const data = json.map(item => ({
                    time: Math.floor(item[0] / 1000),
                    open: parseFloat(item[1]),
                    high: parseFloat(item[2]),
                    low: parseFloat(item[3]),
                    close: parseFloat(item[4]),
                }));
                candleData = data;
                candlestickSeries.setData(data);
                updateIndicators();
            }

            // --- 5. WebSocket для реалтайма ---
            function closeWebSocket() {
                if (ws) {
                    ws.close();
                    ws = null;
                }
                if (wsReconnectTimer) {
                    clearTimeout(wsReconnectTimer);
                    wsReconnectTimer = null;
                }
                activeSubscriptions.clear();
            }

            function subscribeWebSocket(symbol, interval) {
                closeWebSocket();
                
                const streamName = `${symbol.toLowerCase()}@kline_${interval}`;
                activeSubscriptions.add(streamName);
                
                ws = new WebSocket('wss://stream.binance.com:9443/ws');
                
                ws.onopen = () => {
                    console.log('WebSocket connected, subscribing to', streamName);
                    ws.send(JSON.stringify({
                        method: 'SUBSCRIBE',
                        params: [streamName],
                        id: 1
                    }));
                };
                
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    const kline = msg.k;
                    if (!kline) return;
                    
                    // Проверяем, что свеча окончательная (закрыта) или это обновление текущей
                    const isFinal = kline.x;
                    
                    const newCandle = {
                        time: Math.floor(kline.t / 1000),
                        open: parseFloat(kline.o),
                        high: parseFloat(kline.h),
                        low: parseFloat(kline.l),
                        close: parseFloat(kline.c),
                    };
                    
                    // Обновляем последнюю свечу в candleData
                    if (candleData.length > 0 && candleData[candleData.length - 1].time === newCandle.time) {
                        // Обновление существующей свечи
                        candleData[candleData.length - 1] = newCandle;
                        candlestickSeries.update(newCandle);
                    } else {
                        // Новая свеча
                        candleData.push(newCandle);
                        // Ограничим историю 500 элементами
                        if (candleData.length > 500) candleData.shift();
                        candlestickSeries.update(newCandle);
                    }
                    
                    // Обновляем индикаторы (можно оптимизировать, но для 500 свечей быстро)
                    updateIndicators();
                };
                
                ws.onerror = (error) => console.error('WebSocket error:', error);
                
                ws.onclose = () => {
                    console.log('WebSocket closed, reconnect in 3s');
                    // Автопереподключение через 3 секунды
                    wsReconnectTimer = setTimeout(() => {
                        if (activeSubscriptions.size > 0) {
                            subscribeWebSocket(currentAssetSymbol, currentInterval);
                        }
                    }, 3000);
                };
            }

            // --- 6. Загрузка списка монет (топ 50 по росту) ---
            async function loadCoinList() {
                try {
                    const exchangeInfoResp = await fetch(`${API_BASE}/exchangeInfo`);
                    const exchangeInfo = await exchangeInfoResp.json();
                    const usdtPairs = exchangeInfo.symbols.filter(s => s.symbol.endsWith('USDT'));
                    
                    const tickersResp = await fetch(`${API_BASE}/ticker/24hr`);
                    const tickers = await tickersResp.json();
                    
                    const coinData = usdtPairs
                        .map(pair => {
                            const ticker = tickers.find(t => t.symbol === pair.symbol);
                            if (!ticker) return null;
                            return {
                                symbol: pair.symbol.replace('USDT', ''),
                                fullSymbol: pair.symbol,
                                changePercent: parseFloat(ticker.priceChangePercent),
                            };
                        })
                        .filter(c => c !== null)
                        .sort((a, b) => b.changePercent - a.changePercent)
                        .slice(0, 50);
                    
                    const listEl = document.getElementById('coin-list');
                    listEl.innerHTML = '';
                    
                    coinData.forEach(coin => {
                        const change = coin.changePercent;
                        const changeStr = change.toFixed(2) + '%';
                        const changeClass = change >= 0 ? 'positive' : 'negative';
                        
                        const li = document.createElement('li');
                        li.className = 'coin-item' + (coin.fullSymbol === currentAssetSymbol ? ' active' : '');
                        li.innerHTML = `
                            <span class="coin-symbol">${coin.symbol}</span>
                            <span class="coin-change ${changeClass}">${changeStr}</span>
                        `;
                        
                        li.addEventListener('click', () => {
                            currentAssetSymbol = coin.fullSymbol;
                            // Перезагружаем историю и переподключаем WebSocket
                            fetchHistory(currentAssetSymbol, currentInterval).then(() => {
                                subscribeWebSocket(currentAssetSymbol, currentInterval);
                            });
                            document.querySelectorAll('.coin-item').forEach(el => el.classList.remove('active'));
                            li.classList.add('active');
                        });
                        
                        listEl.appendChild(li);
                    });
                } catch (error) {
                    console.error('Ошибка загрузки списка:', error);
                }
            }

            // --- 7. Обработчики кнопок таймфрейма ---
            const tfButtons = document.querySelectorAll('.tf-btn');
            tfButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const interval = btn.getAttribute('data-interval');
                    if (interval === currentInterval) return;
                    
                    currentInterval = interval;
                    tfButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    fetchHistory(currentAssetSymbol, currentInterval).then(() => {
                        subscribeWebSocket(currentAssetSymbol, currentInterval);
                    });
                });
            });

            // --- 8. Старт ---
            fetchHistory(currentAssetSymbol, currentInterval).then(() => {
                subscribeWebSocket(currentAssetSymbol, currentInterval);
            });
            loadCoinList();
        })();
    </script>
</body>
</html>
