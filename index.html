<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Screener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #0e1117;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        .chart-container {
            flex: 4;
            height: 100vh;
        }
        .screener-container {
            flex: 1;
            height: 100vh;
            border-left: 1px solid #2a2e39;
        }
        /* Обеспечиваем, что виджеты займут всю доступную область */
        tv-advanced-chart, tv-screener {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chart-container">
            <tv-advanced-chart
                symbol="BINANCE:BTCUSDT"
                theme="dark"
                interval="60"
                locale="ru"
                hide_side_toolbar="true"
                allow_symbol_change="true"
                disabled_features='["header_widget", "left_toolbar", "control_bar", "timeframes_toolbar"]'
            ></tv-advanced-chart>
        </div>
        <div class="screener-container">
            <tv-screener
                market="crypto"
                default-screen="top_gainers"
                theme="dark"
                locale="ru"
            ></tv-screener>
        </div>
    </div>

    <!-- Подключаем официальный скрипт-загрузчик виджетов TradingView -->
    <script src="https://s3.tradingview.com/tradingview-widget-loader.js"></script>
</body>
</html>
